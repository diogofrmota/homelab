urls:
  - http://kube-prometheus-stack-alertmanager.monitoring:9093/-/healthy
  - http://kube-prometheus-stack-grafana.monitoring/api/health
  - http://kube-prometheus-stack-prometheus.monitoring:9090/-/healthy
  - http://oauth2-proxy.oauth2-proxy/ping
  - https://argocd.diogomota.pt/healthz?full=true
  - https://auth.diogomota.pt/healthz

#cnpgClusters:
#  - name: app_name-cnpg-cluster
#    namespace: app_namespace

# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/common-3.7.3/charts/library/common/values.schema.json
app-template:
  defaultPodOptions:
    automountServiceAccountToken: false
    securityContext:
      runAsUser: 568
      runAsGroup: 568
      fsGroup: 568
      fsGroupChangePolicy: "OnRootMismatch"

  controllers:
    main:
      strategy: RollingUpdate
      type: deployment
      annotations:
        reloader.stakater.com/auto: "true"
      containers:
        main:
          image:
            repository: ghcr.io/cterence/go-healthcheck
            tag: 0.4.0@sha256:e8553c4bfa75023ea040da8c1ca1ddfc4957d8ddd8156d195708a45ffa7a856c
            pullPolicy: Always
          env:
            TZ: Europe/Lisbon
          ports:
            - name: http
              containerPort: 3000
          probes:
            liveness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  port: http
                  path: /health
            readiness:
              enabled: true
              custom: true
              spec:
                httpGet:
                  port: http
                  path: /health
  service:
    main:
      controller: main
      type: ClusterIP
      ports:
        http:
          port: 3000

  ingress:
    main:
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt
        external-dns.alpha.kubernetes.io/target: home.diogomota.pt
      className: "nginx"
      hosts:
        - host: &host health.diogomota.pt
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http
      tls:
        - secretName: health-tls
          hosts:
            - *host

  persistence:
    config:
      type: secret
      name: go-healthcheck-config
      advancedMounts:
        main:
          main:
            - path: /app/config.yaml
              readOnly: true
              subPath: config.yaml
