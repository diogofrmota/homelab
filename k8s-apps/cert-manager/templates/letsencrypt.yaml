apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt
spec:
  acme:
    email: {{ .Values.clusterIssuers.emailSecret.key | default "email" | printf "{{ .Values.clusterIssuers.emailSecret.name }}@%s" | include "cert-manager.getSecretValue" }}
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt
    solvers:
    - http01:
        ingress:
          class: nginx